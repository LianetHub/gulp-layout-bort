<!--
  COMPONENT: Steps Bar
  FIGMA REF: node 27:6 | desktop: h2 29px semibold left, orange bar h120 r20 #ff9b35 pad10, 3 white cards h100 r10 gap10, icon+label row 18px | mobile: stack 1 col
  REUSES: step-card (icon + label)
-->
<section class="brt-rich__section brt-rich__steps">
	<div class="brt-rich__container">
		<div class="brt-rich__section-head brt-rich__section-head--left">
			<h2 class="brt-rich__heading brt-rich__heading--h2">Легкое управление</h2>
		</div>
		<div class="brt-rich__steps-bar">
			<div class="brt-rich-row brt-rich-row--gap-steps">
				<div class="brt-rich-col-12 brt-rich-col-md-4">
					<div class="brt-rich__step-card">
						<img class="brt-rich__step-card-icon" src="img/step-water.svg" alt="" width="52" height="72" loading="lazy">
						<span class="brt-rich__step-label">Включить воду</span>
					</div>
				</div>
				<div class="brt-rich-col-12 brt-rich-col-md-4">
					<div class="brt-rich__step-card">
						<img class="brt-rich__step-card-icon" src="img/step-button.svg" alt="" width="61" height="72" loading="lazy">
						<span class="brt-rich__step-label">Включить измельчитель</span>
					</div>
				</div>
				<div class="brt-rich-col-12 brt-rich-col-md-4">
					<div class="brt-rich__step-card">
						<img class="brt-rich__step-card-icon" src="img/step-waste.png" alt="" width="59" height="72" loading="lazy">
						<span class="brt-rich__step-label">Поместить отходы</span>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
